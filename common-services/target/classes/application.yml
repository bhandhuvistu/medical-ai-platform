ocr:
  enabled: false

spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      client-type: rest_client
      chat:
        options:
          model: llama3.1
          temperature: 0.7
    mcp:
      client:
        enabled: false
    openai:
      chat:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.common.autoconfigure.annotations.McpClientAnnotationScannerAutoConfiguration

embabel:
  models:
    llms:
      best: llama3.1
      cheapest: llama3.1
    default-llm: llama3.1
  agent:
    ranking:
      llm: llama3.1
    llm:
      model-id: llama3.1
  agents:
    scan-packages: com.infinite.newsAIEmbael.agent
  logging:
    theme: starwars

logging:
  level:
    com.embabel: DEBUG
    org.springframework.ai: DEBUG

aws:
  region: ap-south-2
  s3:
    bucket: med-ai-dev-data-762339788669-ap-south-2-an
    insecure-skip-ssl: true