trigger:
  - main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'DockerHub'
  imageRepository: 'bhandhuvistu/medical-ai-platform'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

jobs:
  - job: BuildAndDeploy
    displayName: Build, Test, Docker, Deploy
    steps:
      - bash: |
          echo "Setting JAVA_HOME"
          echo "##vso[task.setvariable variable=JAVA_HOME]/usr/lib/jvm/java-17-openjdk-amd64"
        displayName: Set JAVA_HOME

      - task: Maven@4
        displayName: Build Maven Project
        inputs:
          mavenPomFile: 'pom.xml'
          mavenOptions: '-Xmx3072m'
          javaHomeOption: 'Path'
          jdkUserInputPath: '/usr/lib/jvm/java-17-openjdk-amd64'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'

      - task: Docker@2
        displayName: Build and Push Docker Image
        inputs:
          command: buildAndPush
          repository: $(imageRepository)
          dockerfile: $(dockerfilePath)
          containerRegistry: $(dockerRegistryServiceConnection)
          tags: |
            $(tag)
            latest

      - task: AzureCLI@2
        displayName: Deploy to Dev Environment
        inputs:
          azureSubscription: 'azure-app-service-connection'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            echo "========================================="
            echo "Deploying to Dev Environment"
            echo "========================================="
            echo "Step 1: Delete old container..."
            az container delete --resource-group DefaultResourceGroup-EUS --name medical-ai-dev --yes || true
            echo "Step 2: Creating new container..."
            az container create \
              --resource-group DefaultResourceGroup-EUS \
              --name medical-ai-dev \
              --image docker.io/$(imageRepository):$(tag) \
              --os-type Linux \
              --cpu 1 \
              --memory 1.5 \
              --ports 8080 \
              --protocol TCP \
              --ip-address public \
              --registry-login-server docker.io \
              --registry-username $(dockerHubUsername) \
              --registry-password $(DOCKER_PASSWORD) \
              --restart-policy Always
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to create container"
              exit 1
            fi
            echo "Step 3: Waiting for container to get IP..."
            for i in {1..60}; do
              DEV_IP=$(az container show --resource-group DefaultResourceGroup-EUS --name medical-ai-dev --query ipAddress.ip --output tsv)
              if [ ! -z "$DEV_IP" ] && [ "$DEV_IP" != "None" ]; then
                echo "Container IP assigned: $DEV_IP"
                break
              fi
              echo "Waiting for IP... (attempt $i/60)"
              sleep 2
            done
            echo "Step 4: Verifying container..."
            az container show --resource-group DefaultResourceGroup-EUS --name medical-ai-dev
            echo "Dev deployment completed successfully"
            echo "========================================="

      - task: AzureCLI@2
        displayName: Smoke Tests
        inputs:
          azureSubscription: 'azure-app-service-connection'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            echo "Running Smoke Tests"
            sleep 30
            echo "Checking container status..."
            az container show --resource-group DefaultResourceGroup-EUS --name medical-ai-dev
            echo "Getting container IP..."
            DEV_IP=$(az container show --resource-group DefaultResourceGroup-EUS --name medical-ai-dev --query ipAddress.ip --output tsv)
            echo "Dev Container IP: $DEV_IP"
            if [ -z "$DEV_IP" ] || [ "$DEV_IP" = "None" ]; then
              echo "ERROR: Failed to get container IP"
              exit 1
            fi
            echo "Testing health endpoint..."
            for i in {1..10}; do
              echo "Health check attempt $i/10..."
              curl -v http://$DEV_IP:8080/api/health && break
              sleep 3
            done
            echo "✓ All smoke tests passed"
        condition: succeeded()