trigger:
  - main

pool:
  name: 'Default'

variables:
  dockerRegistryServiceConnection: 'DockerHub'
  imageRepository: 'bhandhuvistu/medical-ai-platform'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  DOCKER_PASSWORD: $(DOCKER_PASSWORD)

jobs:
  - job: BuildAndDeploy
    displayName: Build, Test, Docker, Deploy
    steps:
      # ==========================================
      # STEP 1: BUILD WITH MAVEN
      # ==========================================
      - task: Maven@3
        displayName: Build Maven Project
        inputs:
          mavenPomFile: 'pom.xml'
          mavenOptions: '-Xmx3072m'
          javaHomeOption: 'JDKVersion'
          jdkVersionOption: '17'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'

      # ==========================================
      # STEP 2: BUILD DOCKER IMAGE
      # ==========================================
      - task: Docker@2
        displayName: Build and Push Docker Image
        inputs:
          command: buildAndPush
          repository: $(imageRepository)
          dockerfile: $(dockerfilePath)
          containerRegistry: $(dockerRegistryServiceConnection)
          tags: |
            $(tag)
            latest

      # ==========================================
      # STEP 3: DEPLOY TO DEV ENVIRONMENT
      # ==========================================
      - task: AzureCLI@2
        displayName: Deploy to Dev Environment
        inputs:
          azureSubscription: 'azure-app-service-connection'
          scriptType: 'bash'
          scriptLocation: 'inlineScript'
          inlineScript: |
            echo "========================================="
            echo "Deploying to Dev Environment"
            echo "========================================="
            
            # Delete existing container if it exists
            az container delete \
              --resource-group DefaultResourceGroup-EUS \
              --name medical-ai-dev \
              --yes || true
            
            # Create new container
            az container create \
              --resource-group DefaultResourceGroup-EUS \
              --name medical-ai-dev \
              --image docker.io/$(imageRepository):$(tag) \
              --cpu 1 \
              --memory 1.5 \
              --port 8080 \
              --registry-login-server docker.io \
              --registry-username bhandhuvistu \
              --registry-password $(DOCKER_PASSWORD) \
              --restart-policy Always \
              --environment-variables \
                ENV=development \
                LOG_LEVEL=DEBUG
            
            echo "========================================="
            echo "Dev deployment completed successfully"
            echo "========================================="

      # ==========================================
      # STEP 4: SMOKE TESTS
      # ==========================================
      - script: |
          echo "========================================="
          echo "Running Smoke Tests"
          echo "========================================="
          
          # Wait for container to be ready
          sleep 10
          
          # Get container IP
          DEV_IP=$(az container show \
            --resource-group DefaultResourceGroup-EUS \
            --name medical-ai-dev \
            --query ipAddress.ip \
            --output tsv)
          
          echo "Dev Container IP: $DEV_IP"
          
          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f http://$DEV_IP:8080/api/health || exit 1
          
          echo "✓ All smoke tests passed"
          echo "========================================="
        displayName: Smoke Tests
        condition: succeeded()
